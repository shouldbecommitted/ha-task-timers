<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03a9f4"/>
      <stop offset="100%" stop-color="#0277bd"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Clipboard body -->
  <rect x="56" y="64" width="144" height="160" rx="12" fill="#ffffff"/>

  <!-- Clipboard clip -->
  <rect x="96" y="44" width="64" height="32" rx="6" fill="#01579b"/>
  <rect x="108" y="36" width="40" height="14" rx="4" fill="#01579b"/>

  <!-- Clock face -->
  <circle cx="128" cy="152" r="52" fill="none" stroke="#0277bd" stroke-width="8"/>

  <!-- Hour ticks -->
  <line x1="128" y1="104" x2="128" y2="112" stroke="#0277bd" stroke-width="4" stroke-linecap="round"/>
  <line x1="128" y1="192" x2="128" y2="200" stroke="#0277bd" stroke-width="4" stroke-linecap="round"/>
  <line x1="80"  y1="152" x2="88"  y2="152" stroke="#0277bd" stroke-width="4" stroke-linecap="round"/>
  <line x1="168" y1="152" x2="176" y2="152" stroke="#0277bd" stroke-width="4" stroke-linecap="round"/>

  <!-- Clock hands -->
  <line x1="128" y1="152" x2="128" y2="118" stroke="#01579b" stroke-width="8" stroke-linecap="round"/>
  <line x1="128" y1="152" x2="156" y2="152" stroke="#01579b" stroke-width="6" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="128" cy="152" r="6" fill="#01579b"/>
</svg>
