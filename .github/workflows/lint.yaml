name: Linting

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint black flake8

      - name: Run Black formatter check
        run: black --check custom_components/task_timers

      - name: Run Flake8
        run: flake8 custom_components/task_timers --max-line-length=100 --ignore=E203,E501,W503

      - name: Run Pylint
        run: pylint custom_components/task_timers || true
