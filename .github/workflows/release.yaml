name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest version matches tag
        run: |
          python3 -c "
          import json, sys
          with open('custom_components/task_timers/manifest.json') as f:
              manifest = json.load(f)
          tag = '${{ github.ref_name }}'.lstrip('v')
          if manifest['version'] != tag:
              print(f'ERROR: manifest version {manifest[\"version\"]} does not match tag {tag}')
              sys.exit(1)
          print(f'Version OK: {manifest[\"version\"]}')
          "

      - name: Create zip
        run: |
          cd custom_components
          zip -r ../task_timers.zip task_timers/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: task_timers.zip
          generate_release_notes: true

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
