name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install black flake8

      - name: Black
        run: black --check custom_components/task_timers

      - name: Flake8
        run: flake8 custom_components/task_timers --max-line-length=100 --ignore=E203,E501,W503

  release:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest version matches tag
        run: |
          python3 -c "
          import json, sys
          with open('custom_components/task_timers/manifest.json') as f:
              manifest = json.load(f)
          tag = '${{ github.ref_name }}'.lstrip('v')
          if manifest['version'] != tag:
              print(f'ERROR: manifest version {manifest[\"version\"]} does not match tag {tag}')
              sys.exit(1)
          print(f'Version OK: {manifest[\"version\"]}')
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  hacs:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
