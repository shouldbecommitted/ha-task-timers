name: HACS Validation

on:
  push:
    paths:
      - "custom_component/task_timers/**"
  pull_request:
    paths:
      - "custom_component/task_timers/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: HACS Action
        uses: hacs/action@main
        with:
          category: integration
          path: custom_component/task_timers
